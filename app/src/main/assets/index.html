<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Weather V1</title><style>body{margin:0;background:#07131e;color:white;font-family:system-ui}.app{min-height:100vh;padding:14px;padding-bottom:85px;background:radial-gradient(circle at top,#174569,#07131e 45%,#04070c)}h1{margin:0}.sub,.meta{color:#a8c7d9;font-size:13px}.top{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#0b84ff,#50ff9d);display:grid;place-items:center}.box{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:12px;margin:12px 0}input{width:100%;box-sizing:border-box;padding:12px;border-radius:16px;border:1px solid #36566a;background:#132838;color:white;font-size:16px}.btn{border:0;border-radius:999px;background:#29445a;color:white;font-weight:900;padding:11px 13px;margin:3px}.blue{background:#0b84ff}.green{background:#14a46d}.big{font-size:52px;font-weight:900}.place{font-size:22px;font-weight:900}.hourly{display:flex;overflow:auto;gap:8px}.hour{min-width:86px;background:rgba(255,255,255,.08);border-radius:16px;padding:10px;text-align:center}.card{background:rgba(255,255,255,.08);border-radius:16px;padding:10px;margin:8px 0}.bar{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:6px;overflow:auto}.saved{display:flex;gap:6px;overflow:auto}</style></head><body><div class="app"><div class="top"><div class="logo">🌦️</div><div><h1>B-Weather V1</h1><div id="status" class="sub">Real online weather</div></div></div><div class="box"><input id="city" placeholder="Search city"><button class="btn blue" onclick="searchCity()">Search</button><button class="btn green" onclick="usePhoneLocation()">Here</button><div id="saved" class="saved"></div></div><div class="box" id="current"><div class="place">No location yet</div><div class="meta">Search city or tap Here.</div></div><div class="box"><b>Hourly</b><div id="hourly" class="hourly"></div></div><div class="box"><b>7-Day Forecast</b><div id="daily"></div></div><div class="bar"><button class="btn blue" onclick="searchCity()">Search</button><button class="btn green" onclick="saveCurrent()">Save</button><button class="btn" onclick="openLauncher()">B-Launcher</button><button class="btn" onclick="openTasks()">B-Tasks</button><button class="btn" onclick="openFocus()">B-Focus</button></div></div><script>let cur=null,saved=[];try{saved=JSON.parse(localStorage.getItem('bweather_saved')||'[]')}catch(e){}const W={0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Cloudy',45:'Fog',48:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorm'};function st(s){status.textContent=s}function ic(c){if(c==0)return'☀️';if(c<=2)return'🌤️';if(c==3)return'☁️';if(c==45||c==48)return'🌫️';if(c>=71&&c<=75)return'❄️';if(c>=95)return'⛈️';if(c>=51&&c<=82)return'🌧️';return'🌦️'}async function searchCity(){let q=city.value.trim();if(!q){alert('Type a city first.');return}st('Searching...');try{let r=await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&format=json&name='+encodeURIComponent(q));let j=await r.json();if(!j.results||!j.results.length)throw Error();let x=j.results[0];loadWeather(x.latitude,x.longitude,x.name+(x.admin1?', '+x.admin1:'')+', '+x.country)}catch(e){st('City not found')}}function usePhoneLocation(){try{AndroidBridge.requestLocation()}catch(e){st('Location unavailable')}}window.bweatherUseLocation=(lat,lon)=>loadWeather(lat,lon,'Current location');async function loadWeather(lat,lon,name){cur={lat,lon,name};st('Loading weather...');try{let url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto';let r=await fetch(url),j=await r.json();renderWeather(name,j);localStorage.setItem('bweather_last',JSON.stringify(cur));st('Updated')}catch(e){st('Could not load weather')}}function renderWeather(name,j){let c=j.current,code=c.weather_code;current.innerHTML='<div class=place>'+esc(name)+'</div><div class=big>'+Math.round(c.temperature_2m)+'°F '+ic(code)+'</div><div class=meta>'+(W[code]||'Weather')+' · Feels '+Math.round(c.apparent_temperature)+'°F · Humidity '+c.relative_humidity_2m+'% · Wind '+Math.round(c.wind_speed_10m)+' mph</div>';hourly.innerHTML='';for(let i=0;i<Math.min(24,j.hourly.time.length);i++){let d=new Date(j.hourly.time[i]),h=document.createElement('div');h.className='hour';h.innerHTML='<b>'+d.getHours()+':00</b><div>'+ic(j.hourly.weather_code[i])+'</div><div>'+Math.round(j.hourly.temperature_2m[i])+'°</div><div class=meta>'+j.hourly.precipitation_probability[i]+'%</div>';hourly.appendChild(h)}daily.innerHTML='';for(let i=0;i<j.daily.time.length;i++){let d=document.createElement('div');d.className='card';d.innerHTML='<b>'+j.daily.time[i]+'</b><div>'+(W[j.daily.weather_code[i]]||'Weather')+' '+ic(j.daily.weather_code[i])+'</div><div class=meta>'+Math.round(j.daily.temperature_2m_min[i])+'° / '+Math.round(j.daily.temperature_2m_max[i])+'° · rain '+j.daily.precipitation_probability_max[i]+'%</div>';daily.appendChild(d)}}function saveCurrent(){if(!cur){alert('Load a city first.');return}saved=saved.filter(x=>x.name!=cur.name);saved.unshift(cur);saved=saved.slice(0,10);localStorage.setItem('bweather_saved',JSON.stringify(saved));renderSaved()}function renderSaved(){saved.innerHTML='';}function drawSaved(){let s=document.getElementById('saved');s.innerHTML='';saved.forEach(x=>{let b=document.createElement('button');b.className='btn';b.textContent=x.name.split(',')[0];b.onclick=()=>loadWeather(x.lat,x.lon,x.name);s.appendChild(b)})}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function openApp(p,c,n){try{AndroidBridge.openApp(p,c,n)}catch(e){}}function openLauncher(){openApp('com.chenboda01.blauncherv1','com.chenboda01.blauncherv1.MainActivity','B-Launcher V1')}function openTasks(){openApp('com.chenboda01.btasksv1','com.chenboda01.btasksv1.MainActivity','B-Tasks V1')}function openFocus(){openApp('com.chenboda01.bfocusv1','com.chenboda01.bfocusv1.MainActivity','B-Focus V1')}window.bweatherBack=function(){city.value='';st('Ready')};function renderSaved(){drawSaved()}renderSaved();try{let last=JSON.parse(localStorage.getItem('bweather_last')||'null');if(last)loadWeather(last.lat,last.lon,last.name)}catch(e){}</script></body></html>
